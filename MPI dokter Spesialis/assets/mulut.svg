<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" id="mulut" width="240" height="240">
  <!-- MULUT / RONGGA ORAL -->
  <defs>
    <radialGradient id="mLip" cx="38%" cy="28%" r="72%"><stop offset="0%" stop-color="#FAD3AE"/><stop offset="100%" stop-color="#C08050"/></radialGradient>
    <radialGradient id="mMouth" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#E05060"/><stop offset="100%" stop-color="#9A1020"/></radialGradient>
    <filter id="mShadow"><feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#401000" flood-opacity="0.4"/></filter>
  </defs>
  <!-- bibir atas -->
  <path d="M48 90 Q120 60 192 90 Q182 80 168 78 Q148 74 120 76 Q92 74 72 78 Q58 80 48 90Z" fill="url(#mLip)" filter="url(#mShadow)"/>
  <!-- bibir bawah -->
  <path d="M48 96 Q50 120 62 130 Q90 148 120 148 Q150 148 178 130 Q190 120 192 96 Q165 116 120 118 Q75 116 48 96Z" fill="url(#mLip)" filter="url(#mShadow)"/>
  <!-- bibir merah -->
  <path d="M52 92 Q76 78 120 78 Q164 78 188 92" fill="none" stroke="#D05060" stroke-width="10" stroke-linecap="round"/>
  <path d="M52 96 Q78 110 120 112 Q162 110 188 96" fill="none" stroke="#C04060" stroke-width="9" stroke-linecap="round"/>
  <!-- rongga dalam -->
  <path d="M64 96 Q120 86 176 96 Q170 118 156 128 Q138 140 120 141 Q102 140 84 128 Q70 118 64 96Z" fill="url(#mMouth)"/>
  <!-- gigi atas -->
  <g fill="white" stroke="#D0C0B0" stroke-width="1">
    <rect x="78" y="88" width="12" height="16" rx="3"/><rect x="92" y="86" width="12" height="18" rx="3"/>
    <rect x="106" y="84" width="12" height="18" rx="3"/><rect x="120" y="84" width="12" height="18" rx="3"/>
    <rect x="134" y="86" width="12" height="18" rx="3"/><rect x="148" y="88" width="12" height="16" rx="3"/>
  </g>
  <!-- gigi bawah -->
  <g fill="white" stroke="#D0C0B0" stroke-width="1">
    <rect x="80" y="110" width="11" height="14" rx="3"/><rect x="93" y="110" width="11" height="16" rx="3"/>
    <rect x="106" y="110" width="11" height="16" rx="3"/><rect x="119" y="110" width="11" height="16" rx="3"/>
    <rect x="132" y="110" width="11" height="16" rx="3"/><rect x="145" y="110" width="11" height="14" rx="3"/>
  </g>
  <!-- lidah -->
  <path d="M80 126 Q120 120 160 126 Q150 145 120 148 Q90 145 80 126Z" fill="#D05070"/>
  <text x="120" y="176" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#9A2030">Mulut (Rongga Oral)</text>
</svg>
