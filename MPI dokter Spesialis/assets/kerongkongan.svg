  <path d="M110 12 C107 40 106 80 108 120 C110 160 114 195 118 220" fill="none" stroke="url(#esInner)" stroke-width="16" stroke-linecap="round" opacity="0.65"/>

  <!-- lipatan mukosa (mucosal folds) -->
