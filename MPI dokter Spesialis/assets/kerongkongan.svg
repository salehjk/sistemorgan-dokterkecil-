<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="esGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D0A0A8"/><stop offset="40%" stop-color="#F0D8DC"/><stop offset="100%" stop-color="#D0A0A8"/></linearGradient>
    <linearGradient id="esInner" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E8BCBC"/><stop offset="50%" stop-color="#FFF0F0"/><stop offset="100%" stop-color="#E8BCBC"/></linearGradient>
    <filter id="esShadow"><feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#401018" flood-opacity="0.38"/></filter>
  </defs>

  <!-- esofagus (batang memanjang, sedikit berkelok natural) -->
  <path d="M96 12 C92 40 90 80 92 120 C94 160 100 195 108 220" fill="none" stroke="url(#esGrad)" stroke-width="44" stroke-linecap="round" filter="url(#esShadow)"/>
