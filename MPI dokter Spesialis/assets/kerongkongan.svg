  <!-- gelombang peristaltik (daerah kontraksi — bayangan gelap) -->
  <path d="M94 68 C100 64 106 64 112 68 C118 72 112 76 106 76 C100 76 94 72 94 68 Z" fill="#B87080" opacity="0.45"/>
  <path d="M128 68 C134 64 140 64 146 68 C148 72 142 76 136 76 C130 76 128 72 128 68 Z" fill="#B87080" opacity="0.35"/>

  <path d="M93 108 C99 104 105 104 111 108 C117 112 111 116 105 116 C99 116 93 112 93 108 Z" fill="#B87080" opacity="0.45"/>
  <path d="M129 108 C135 104 141 104 147 108 C149 112 143 116 137 116 C131 116 129 112 129 108 Z" fill="#B87080" opacity="0.35"/>

  <!-- panah arah -->
  <path d="M162 100 L170 110 L162 120" fill="none" stroke="#D84060" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <text x="172" y="108" font-family="sans-serif" font-size="8" fill="#C03050" opacity="0.85">ke</text>
  <text x="172" y="118" font-family="sans-serif" font-size="8" fill="#C03050" opacity="0.85">bawah</text>

  <!-- label -->
