<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="trGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D8C0C0"/><stop offset="40%" stop-color="#F8EEEE"/><stop offset="100%" stop-color="#D8C0C0"/></linearGradient>
    <linearGradient id="trRing" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#B09090"/><stop offset="50%" stop-color="#E8D8D8"/><stop offset="100%" stop-color="#B09090"/></linearGradient>
    <radialGradient id="trBronch" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="#ECD8D8"/><stop offset="100%" stop-color="#C4A0A0"/></radialGradient>
    <filter id="trShadow"><feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#402020" flood-opacity="0.4"/></filter>
  </defs>

  <!-- badan trakea utama -->
  <rect x="96" y="8" width="48" height="140" rx="22" fill="url(#trGrad)" filter="url(#trShadow)"/>

  <!-- lapisan dalam lumen -->
  <rect x="106" y="12" width="28" height="132" rx="13" fill="#FFF0F0" opacity="0.6"/>

  <!-- silia di dalam -->
