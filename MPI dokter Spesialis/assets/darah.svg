<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="rbcGrad" cx="35%" cy="30%" r="72%"><stop offset="0%" stop-color="#FF9090"/><stop offset="55%" stop-color="#D83030"/><stop offset="100%" stop-color="#8A0010"/></radialGradient>
    <radialGradient id="wbcGrad" cx="35%" cy="30%" r="72%"><stop offset="0%" stop-color="#E8F0FF"/><stop offset="60%" stop-color="#C0CCEE"/><stop offset="100%" stop-color="#8090C0"/></radialGradient>
    <radialGradient id="platelet" cx="35%" cy="30%" r="72%"><stop offset="0%" stop-color="#FFE8C0"/><stop offset="100%" stop-color="#C09040"/></radialGradient>
    <filter id="bldShadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#300008" flood-opacity="0.4"/></filter>
  </defs>

  <!-- plasma background hints -->
  <ellipse cx="120" cy="120" rx="112" ry="112" fill="#FFF8F0" opacity="0.15"/>

  <!-- sel darah merah (eritrosit) — bentuk bikonkaf/keping -->
  <!-- besar (tampak depan) -->
  <ellipse cx="76" cy="80" rx="34" ry="28" fill="url(#rbcGrad)" filter="url(#bldShadow)"/>
  <ellipse cx="76" cy="80" rx="20" ry="15" fill="#AA1020" opacity="0.45"/>
  <ellipse cx="68" cy="72" rx="10" ry="7" fill="#FF9090" opacity="0.28"/>

  <ellipse cx="164" cy="68" rx="34" ry="28" fill="url(#rbcGrad)" filter="url(#bldShadow)"/>
  <ellipse cx="164" cy="68" rx="20" ry="15" fill="#AA1020" opacity="0.45"/>
  <ellipse cx="156" cy="60" rx="10" ry="7" fill="#FF9090" opacity="0.28"/>

  <ellipse cx="120" cy="120" rx="36" ry="29" fill="url(#rbcGrad)" filter="url(#bldShadow)"/>
  <ellipse cx="120" cy="120" rx="22" ry="16" fill="#AA1020" opacity="0.45"/>
  <ellipse cx="110" cy="112" rx="12" ry="8" fill="#FF9090" opacity="0.28"/>

  <ellipse cx="66" cy="162" rx="32" ry="26" fill="url(#rbcGrad)" filter="url(#bldShadow)"/>
  <ellipse cx="66" cy="162" rx="18" ry="14" fill="#AA1020" opacity="0.45"/>
  <ellipse cx="58" cy="155" rx="9" ry="7" fill="#FF9090" opacity="0.25"/>

  <ellipse cx="172" cy="152" rx="32" ry="26" fill="url(#rbcGrad)" filter="url(#bldShadow)"/>
  <ellipse cx="172" cy="152" rx="18" ry="14" fill="#AA1020" opacity="0.45"/>
  <ellipse cx="164" cy="145" rx="9" ry="7" fill="#FF9090" opacity="0.25"/>

  <!-- sel darah merah tampak samping (elips tipis) -->
  <ellipse cx="44" cy="120" rx="8" ry="26" fill="url(#rbcGrad)" opacity="0.85"/>
  <ellipse cx="196" cy="110" rx="8" ry="26" fill="url(#rbcGrad)" opacity="0.85"/>
  <ellipse cx="130" cy="180" rx="26" ry="8" fill="url(#rbcGrad)" opacity="0.85"/>

  <!-- sel darah putih (leukosit) — lebih besar, tidak teratur -->
  <circle cx="148" cy="120" rx="22" fill="url(#wbcGrad)" filter="url(#bldShadow)" opacity="0.9"/>
  <path d="M148 120 m-12 -4 c4-8 12-10 18-4 c4 8 2 16-6 18 c-8 2-16-6-12-14Z" fill="#B0BEDD" opacity="0.4"/>
  <!-- inti sel darah putih (nukleus berlobus) -->
  <path d="M144 116 C142 110 148 108 152 112 C156 116 154 122 150 124 C146 126 140 120 144 116Z" fill="#7080A8" opacity="0.55"/>

  <!-- trombosit (platelet) — kecil-kecil -->
  <ellipse cx="96" cy="148" rx="7" ry="5" fill="url(#platelet)" opacity="0.85"/>
  <ellipse cx="142" cy="170" rx="7" ry="5" fill="url(#platelet)" opacity="0.85"/>
  <ellipse cx="192" cy="136" rx="7" ry="5" fill="url(#platelet)" opacity="0.85"/>

  <!-- label -->
  <text x="75" y="116" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FFD0D0" opacity="0.9">Eritrosit</text>
  <text x="148" y="145" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#D0D8FF" opacity="0.9">Leukosit</text>
  <text x="100" y="168" font-family="sans-serif" font-size="7" fill="#E8C080" opacity="0.8">Trombosit</text>

  <text x="120" y="210" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#A01020">Sel Darah</text>
  <text x="120" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#B04040" opacity="0.85">Eritrosit · Leukosit · Trombosit</text>
</svg>
