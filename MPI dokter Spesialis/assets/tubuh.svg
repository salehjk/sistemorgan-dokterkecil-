<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 560" width="300" height="560">
  <defs>
    <linearGradient id="bodyMain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C08050"/><stop offset="28%" stop-color="#EDB882"/><stop offset="50%" stop-color="#F5C898"/><stop offset="72%" stop-color="#EDB882"/><stop offset="100%" stop-color="#C08050"/>
    </linearGradient>
    <linearGradient id="bodyLimb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B07040"/><stop offset="50%" stop-color="#E8A870"/><stop offset="100%" stop-color="#B07040"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAD3AE"/><stop offset="100%" stop-color="#DCA070"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2010"/><stop offset="100%" stop-color="#1A0C04"/>
    </linearGradient>
    <filter id="bodyShadow"><feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#3A1000" flood-opacity="0.45"/></filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- bayangan lembut di bawah -->
  <ellipse cx="150" cy="544" rx="72" ry="12" fill="#2A0800" opacity="0.25" filter="url(#softBlur)"/>

  <!-- ===== KEPALA ===== -->
  <!-- rambut (dibelakang kepala) -->
  <ellipse cx="150" cy="54" rx="42" ry="46" fill="url(#hairGrad)"/>
  <!-- wajah -->
  <ellipse cx="150" cy="56" rx="38" ry="42" fill="url(#faceGrad)" filter="url(#bodyShadow)"/>
  <!-- bayangan sisi wajah -->
  <ellipse cx="114" cy="58" rx="12" ry="36" fill="#B07040" opacity="0.4"/>
  <ellipse cx="186" cy="58" rx="12" ry="36" fill="#B07040" opacity="0.4"/>
  <!-- sorot dahi -->
  <ellipse cx="148" cy="36" rx="18" ry="11" fill="#FCECD4" opacity="0.55"/>
  <!-- telinga -->
  <ellipse cx="112" cy="60" rx="7.5" ry="11" fill="#D8965C"/>
  <path d="M113 54 C116 58 116 62 113 66" fill="none" stroke="#B07040" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="188" cy="60" rx="7.5" ry="11" fill="#D8965C"/>
  <path d="M187 54 C184 58 184 62 187 66" fill="none" stroke="#B07040" stroke-width="1.5" opacity="0.5"/>
  <!-- rambut depan -->
  <path d="M112 26 Q150 8 188 26 Q180 18 168 14 Q150 8 132 14 Q120 18 112 26Z" fill="url(#hairGrad)"/>
  <!-- alis -->
  <path d="M126 44 C130 40 138 40 142 44" stroke="#2A1008" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M158 44 C162 40 170 40 174 44" stroke="#2A1008" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- mata kiri -->
  <ellipse cx="134" cy="52" rx="8" ry="5.5" fill="white" opacity="0.9"/>
  <circle cx="134" cy="52" r="3.6" fill="#5C3A1E"/>
  <circle cx="134" cy="52" r="2" fill="#1A0A04"/>
  <circle cx="135.6" cy="50.4" r="1.2" fill="white" opacity="0.9"/>
  <!-- mata kanan -->
  <ellipse cx="166" cy="52" rx="8" ry="5.5" fill="white" opacity="0.9"/>
  <circle cx="166" cy="52" r="3.6" fill="#5C3A1E"/>
  <circle cx="166" cy="52" r="2" fill="#1A0A04"/>
  <circle cx="167.6" cy="50.4" r="1.2" fill="white" opacity="0.9"/>
  <!-- bulu mata -->
  <path d="M126 48 C130 45 138 44 142 47" fill="none" stroke="#1A0A04" stroke-width="1.5" opacity="0.65"/>
  <path d="M158 48 C162 45 170 44 174 47" fill="none" stroke="#1A0A04" stroke-width="1.5" opacity="0.65"/>
  <!-- hidung -->
  <path d="M147 58 C145 63 143 67 143 70 C143 73 146 75 150 75 C154 75 157 73 157 70 C157 67 155 63 153 58" fill="#C88C54" opacity="0.7"/>
  <circle cx="145" cy="70" r="4.5" fill="#A07040" opacity="0.45"/>
  <circle cx="155" cy="70" r="4.5" fill="#A07040" opacity="0.45"/>
  <!-- mulut -->
  <path d="M138 80 Q150 87 162 80" fill="none" stroke="#C07060" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M140 82 Q150 88 160 82 Q154 90 150 91 Q146 90 140 82Z" fill="#CC6870" opacity="0.7"/>

  <!-- ===== LEHER ===== -->
  <path d="M136 94 h28 v20 q0 8-14 10 q-14-2-14-10 z" fill="url(#faceGrad)" filter="url(#bodyShadow)"/>
  <line x1="150" y1="94" x2="150" y2="114" stroke="#B07040" stroke-width="1.5" opacity="0.35"/>

  <!-- ===== BADAN / TORSO ===== -->
  <path d="M150 114 c-30 0-50 10-53 32 c-2 22 0 52 5 76 c-6 26-8 56-8 92 l5 96 c1 12 20 12 21 0 l9-96 q4-14 8 0 l9 96 c1 12 20 12 21 0 l5-96 c0-36-2-66-8-92 c5-24 7-54 5-76 c-3-22-22-32-53-32z" fill="url(#bodyMain)" filter="url(#bodyShadow)"/>

  <!-- bayangan tepi badan -->
  <path d="M100 122 c-20 6-26 30-24 58" stroke="#A06030" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M200 122 c20 6 26 30 24 58" stroke="#A06030" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- sorot tengah dada -->
  <ellipse cx="150" cy="162" rx="26" ry="36" fill="#FCECD4" opacity="0.22"/>

  <!-- garis anatomi perut -->
  <line x1="150" y1="126" x2="150" y2="308" stroke="#A06030" stroke-width="1.8" opacity="0.25"/>
  <!-- garis iga (costa) -->
  <path d="M112 140 C122 136 134 136 142 140" fill="none" stroke="#A06030" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M108 155 C118 150 132 150 143 155" fill="none" stroke="#A06030" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
  <path d="M106 170 C117 165 133 165 144 170" fill="none" stroke="#A06030" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
  <path d="M188 140 C178 136 166 136 158 140" fill="none" stroke="#A06030" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M192 155 C182 150 168 150 157 155" fill="none" stroke="#A06030" stroke-width="1.5" stroke-linecap="round" opacity="0.28"/>
  <path d="M194 170 C183 165 167 165 156 170" fill="none" stroke="#A06030" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
  <!-- pusar -->
  <circle cx="150" cy="218" r="5" fill="#9A6030" opacity="0.5"/>

  <!-- ===== LENGAN KIRI ===== -->
  <path d="M100 128 c-12 2-20 10-24 26 l-16 80 c-2 10 14 13 17 2 l16-74 c2-10 5-18 9-24z" fill="url(#bodyLimb)" filter="url(#bodyShadow)"/>
  <path d="M96 134 l-28 98" stroke="#A06030" stroke-width="4" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- siku kiri -->
  <ellipse cx="80" cy="210" rx="10" ry="7" fill="#C88050" transform="rotate(-22 80 210)"/>
  <path d="M73 206 Q80 212 87 206" fill="none" stroke="#FCECD4" stroke-width="2" opacity="0.4"/>
  <!-- tangan kiri -->
  <ellipse cx="64" cy="240" rx="13" ry="9" fill="#D8965C" transform="rotate(-18 64 240)"/>
  <path d="M56 238 c-2-4 0-7 3-7 M60 236 c-1-5 1-8 4-8 M65 235 c0-5 2-9 5-9 M70 236 c1-5 3-8 6-7 M74 240 c2-3 4-5 6-4" stroke="#C07840" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- ===== LENGAN KANAN ===== -->
  <path d="M200 128 c12 2 20 10 24 26 l16 80 c2 10-14 13-17 2 l-16-74 c-2-10-5-18-9-24z" fill="url(#bodyLimb)" filter="url(#bodyShadow)"/>
  <path d="M204 134 l28 98" stroke="#A06030" stroke-width="4" fill="none" opacity="0.25" stroke-linecap="round"/>
  <!-- siku kanan -->
  <ellipse cx="220" cy="210" rx="10" ry="7" fill="#C88050" transform="rotate(22 220 210)"/>
  <path d="M213 206 Q220 212 227 206" fill="none" stroke="#FCECD4" stroke-width="2" opacity="0.4"/>
  <!-- tangan kanan -->
  <ellipse cx="236" cy="240" rx="13" ry="9" fill="#D8965C" transform="rotate(18 236 240)"/>
  <path d="M244 238 c2-4 0-7-3-7 M240 236 c1-5-1-8-4-8 M235 235 c0-5-2-9-5-9 M230 236 c-1-5-3-8-6-7 M226 240 c-2-3-4-5-6-4" stroke="#C07840" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- ===== PAHA & KAKI ===== -->
  <!-- paha kiri -->
  <path d="M124 308 c-8 0-14 6-16 16 l-6 96 c-1 10 16 11 17 0 l7-72 q2-10 4 0 l3 72 c1 7 12 7 13 0 l2-96 c0-10-6-16-14-16z" fill="url(#bodyLimb)" filter="url(#bodyShadow)"/>
  <!-- paha kanan -->
  <path d="M176 308 c8 0 14 6 16 16 l6 96 c1 10-16 11-17 0 l-7-72 q-2-10-4 0 l-3 72 c-1 7-12 7-13 0 l-2-96 c0-10 6-16 14-16z" fill="url(#bodyLimb)" filter="url(#bodyShadow)"/>

  <!-- lutut kiri & kanan -->
  <ellipse cx="126" cy="412" rx="16" ry="12" fill="#C88050" opacity="0.85"/>
  <path d="M116 410 Q126 416 136 410" fill="none" stroke="#FCECD4" stroke-width="2.5" opacity="0.4"/>
  <ellipse cx="174" cy="412" rx="16" ry="12" fill="#C88050" opacity="0.85"/>
  <path d="M164 410 Q174 416 184 410" fill="none" stroke="#FCECD4" stroke-width="2.5" opacity="0.4"/>

  <!-- betis kiri -->
  <path d="M118 420 c-4 0-8 4-9 12 l-4 66 c-1 8 12 8 13 0 l4-66 c1-8-3-12-4-12z" fill="url(#bodyLimb)"/>
  <!-- betis kanan -->
  <path d="M182 420 c4 0 8 4 9 12 l4 66 c1 8-12 8-13 0 l-4-66 c-1-8 3-12 4-12z" fill="url(#bodyLimb)"/>

  <!-- kaki / telapak -->
  <ellipse cx="120" cy="502" rx="20" ry="9" fill="#C08050" transform="rotate(-8 120 502)"/>
  <ellipse cx="180" cy="502" rx="20" ry="9" fill="#C08050" transform="rotate(8 180 502)"/>
  <!-- jari kaki kiri -->
  <g fill="#B07040" opacity="0.8">
    <circle cx="104" cy="504" r="3.5"/><circle cx="110" cy="506" r="3.5"/><circle cx="117" cy="507" r="3.5"/>
    <circle cx="124" cy="507" r="3.5"/><circle cx="131" cy="505" r="3.2"/>
  </g>
  <!-- jari kaki kanan -->
  <g fill="#B07040" opacity="0.8">
    <circle cx="196" cy="504" r="3.5"/><circle cx="190" cy="506" r="3.5"/><circle cx="183" cy="507" r="3.5"/>
    <circle cx="176" cy="507" r="3.5"/><circle cx="169" cy="505" r="3.2"/>
  </g>
</svg>
