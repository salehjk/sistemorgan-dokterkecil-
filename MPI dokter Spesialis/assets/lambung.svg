<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="stOuter" cx="38%" cy="30%" r="72%"><stop offset="0%" stop-color="#FFC0CC"/><stop offset="55%" stop-color="#D85070"/><stop offset="100%" stop-color="#8A1530"/></radialGradient>
    <radialGradient id="stInner" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#FFE8EC"/><stop offset="100%" stop-color="#D06070"/></radialGradient>
    <filter id="stShadow"><feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#4A0010" flood-opacity="0.45"/></filter>
  </defs>

  <!-- esofagus (ujung atas) -->
  <rect x="105" y="8" width="18" height="35" rx="8" fill="#F4C0C8" opacity="0.85"/>
  <rect x="109" y="8" width="6" height="35" rx="3" fill="white" opacity="0.3"/>

  <!-- badan lambung utama — bentuk J melengkung -->
  <path d="M118 40 C118 40 108 42 98 52 C82 68 72 90 70 114 C68 138 74 162 86 178 C98 194 114 202 128 198 C148 192 162 174 166 152 C170 130 162 106 148 92 C138 82 132 74 130 62 C128 52 126 44 118 40 Z" fill="url(#stOuter)" filter="url(#stShadow)"/>

  <!-- lapisan dalam (mukosa) -->
  <path d="M118 50 C110 52 100 62 92 78 C82 96 78 118 80 140 C84 162 96 178 112 182 C128 186 144 174 150 156 C156 138 152 114 142 100 C134 90 128 80 126 68 C124 56 122 50 118 50 Z" fill="url(#stInner)" opacity="0.55"/>

  <!-- rugae (lipatan mukosa) -->
  <path d="M102 72 C108 78 112 86 110 94" fill="none" stroke="#B84060" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M94 90 C102 96 106 106 104 116" fill="none" stroke="#B84060" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M90 112 C98 118 102 128 100 138" fill="none" stroke="#B84060" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M92 138 C100 142 106 150 108 160" fill="none" stroke="#B84060" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M108 66 C116 72 122 82 120 92" fill="none" stroke="#B84060" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M116 92 C124 98 130 108 130 118" fill="none" stroke="#B84060" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
  <path d="M118 118 C126 122 132 132 130 142" fill="none" stroke="#B84060" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>

  <!-- kardia (ujung atas lambung) -->
  <ellipse cx="118" cy="48" rx="14" ry="9" fill="#F4A0B0" stroke="#A03050" stroke-width="1.5"/>

  <!-- pilorus (ujung bawah / katup ke usus halus) -->
  <path d="M126 192 C126 200 130 208 136 212 C142 208 148 200 148 192" fill="#E87090" stroke="#A03050" stroke-width="1.8"/>
  <line x1="136" y1="200" x2="136" y2="216" stroke="#D06070" stroke-width="3" stroke-linecap="round"/>

  <!-- sorot cahaya -->
  <ellipse cx="96" cy="88" rx="14" ry="26" fill="white" opacity="0.2" transform="rotate(-18 96 88)"/>

  <!-- panah peristaltik -->
  <path d="M72 108 L66 114 L72 120" fill="none" stroke="#D84060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  <path d="M71 114 L84 114" fill="none" stroke="#D84060" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>

  <!-- label -->
  <text x="120" y="232" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="15" font-weight="700" fill="#8A1530">Lambung</text>
  <text x="80" y="124" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#FFE0E8" opacity="0.9" transform="rotate(-12 80 124)">Rugae</text>
</svg>
